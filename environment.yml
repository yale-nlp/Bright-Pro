name: brightpro-eval
channels: [pytorch, nvidia, conda-forge]
dependencies:
  - python=3.10
  - pip
  - pip:
    # ── Core compute stack ────────────────────────────────────────────────────
    # torch 2.7+cu128 runs on Hopper (H100/H200), Blackwell B200 (SM 10.0), and
    # RTX PRO 6000 Blackwell (SM 12.0). Older cu121 wheels fail with
    # "no kernel image available" on the newer GPUs.
    - --extra-index-url https://download.pytorch.org/whl/cu128
    - torch==2.7.1
    - torchmetrics==1.9.0

    # ── Transformers ──────────────────────────────────────────────────────────
    # transformers 4.55.2 — last stable 4.x. Required because several retrievers
    # (GritLM-7B, gte-Qwen2-7B-instruct, ReasonIR-8B, inf-retriever-v1-pro) load
    # HF modeling files via trust_remote_code=True, and those files depend on:
    #   * ``config.rope_theta`` as a direct attribute (moved into rope_parameters
    #     in tf 5.5+)
    #   * ``DynamicCache.{from,to}_legacy_cache`` (removed in tf 5.5+)
    #   * ``modeling_attn_mask_utils`` with the ``is_causal`` toggle (deprecated
    #     in tf 5.5+; the toggle silently stops propagating)
    # Under tf 5.5 the models load without crash but produce near-zero NDCG.
    - transformers==4.55.2

    # ── Embedding wrappers ────────────────────────────────────────────────────
    - sentence-transformers==5.4.1
    - gritlm==1.0.2

    # ── Retrieval / metrics / API ─────────────────────────────────────────────
    - pytrec-eval-terrier==0.5.10
    - tiktoken>=0.8
    - openai>=1.50
    - python-dotenv>=1.0

    # ── Lexical (BM25) — needs Java >= 11 at runtime; see README ──────────────
    - pyserini>=0.43
    - gensim==4.4.0

    # ── Utilities ─────────────────────────────────────────────────────────────
    - datasets>=2.16
    - accelerate
    - pandas
    - numpy<2.0
    - scikit-learn
    - tqdm
    - safetensors
    - huggingface-hub>=0.24
